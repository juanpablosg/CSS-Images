<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Images</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <section class="hero">
            <figure class="profile-pic-figure">
                <img src="img/profile-800x800.png" alt="Profile picture" title="This is a profile picture of Jane Doe" width="800" height="800">
                <figcaption class="offscreen">Jane Dore</figcaption>
            </figure>
            <h1 class="h1">
                <span class="no-wrap">Hello 👋</span> <span class="no-wrap">I'm Jane</span>
            </h1>
        </section>
    </div>
</body>
</html>
